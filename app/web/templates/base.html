<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}ShelfOS{% endblock %}</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css"
    />
    <link rel="stylesheet" href="/static/app.css" />
    <script src="https://unpkg.com/htmx.org@2.0.3"></script>
    <script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
  </head>
  <body>
    <main class="container">
      <nav>
        <ul>
          <li><a href="/"><strong>ShelfOS</strong></a></li>
        </ul>
        <ul>
          <li><a href="/docs">API</a></li>
          {% if current_user %}
          <li>{{ current_user.name }} ({{ current_user.role.value }})</li>
          <li>
            <form action="/logout" method="post" style="margin: 0">
              <button type="submit" class="secondary outline">Log out</button>
            </form>
          </li>
          {% endif %}
        </ul>
      </nav>
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
  </body>
</html>
