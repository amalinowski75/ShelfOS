{% extends "base.html" %}
{% block title %}Components — ShelfOS{% endblock %}

{% block content %}
<div class="head">
  <div>
    <h1>Components</h1>
    <p>Inventory of electronic components.</p>
  </div>
  <div class="head-actions">
    <div class="field">
      <label for="type-filter">Type</label>
      <select id="type-filter" class="control">
        <option value="">All types</option>
        {% for t in types %}
        <option value="{{ t.id }}">{{ t.name }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
</div>

<div id="components-table"></div>

<dialog id="stock-dialog">
  <article>
    <header>
      <strong id="stock-dialog-title">Add stock</strong>
      <button class="close" aria-label="Close" data-close></button>
    </header>
    <form id="stock-form">
      <input type="hidden" name="component_id" />
      <input type="hidden" name="mode" />
      <div class="field">
        <label>Quantity</label>
        <input class="control mono" type="number" name="quantity" min="1" value="1" required />
      </div>
      <div class="field">
        <label>Location</label>
        <select class="control" name="location_id" required>
          {% for loc in locations %}
          <option value="{{ loc.id }}">{{ loc.name }} ({{ loc.type.value }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label>Note</label>
        <input class="control" type="text" name="note" placeholder="optional" />
      </div>
      <p id="stock-error" class="error" hidden></p>
      <footer>
        <button type="button" class="btn btn-ghost" data-close>Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </footer>
    </form>
  </article>
</dialog>
{% endblock %}

{% block scripts %}
<script src="/static/app.js?v={{ static_version() }}"></script>
{% endblock %}
