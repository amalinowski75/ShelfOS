{% extends "base.html" %}
{% block title %}Sign in — ShelfOS{% endblock %}

{% block content %}
<article style="max-width: 24rem; margin: 2rem auto">
  <hgroup>
    <h1>Sign in</h1>
    <p>Enter your ShelfOS credentials.</p>
  </hgroup>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form action="/login" method="post">
    <label>
      Username
      <input type="text" name="username" autocomplete="username" required autofocus />
    </label>
    <label>
      Password
      <input
        type="password"
        name="password"
        autocomplete="current-password"
        required
      />
    </label>
    <button type="submit">Sign in</button>
  </form>
</article>
{% endblock %}
