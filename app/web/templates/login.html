{% extends "base.html" %}
{% block title %}Sign in — ShelfOS{% endblock %}

{% block content %}
<div class="login">
  <div class="card">
    <div class="card-pad">
      <div>
        <h1>Sign in</h1>
        <p class="lede">Enter your ShelfOS credentials.</p>
      </div>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <form action="/login" method="post">
        <div class="field">
          <label>Username</label>
          <input class="control" type="text" name="username" autocomplete="username" required autofocus />
        </div>
        <div class="field">
          <label>Password</label>
          <input class="control" type="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
