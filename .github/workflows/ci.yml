name: CI

# Run the same checks we run locally on every push to a pull request. The Python
# and web suites run as independent parallel jobs to cut wall-clock; the `checks`
# gate below aggregates them so the existing required status check keeps working
# without a branch-protection change.
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  python:
    name: Python (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy app

      - name: Tests (pytest)
        run: pytest

  web:
    name: Web (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Web UI tests (vitest)
        run: npm test

  # Aggregate gate: the branch ruleset requires a status check named `checks`, so
  # keep one that passes only when both suites pass. `if: always()` ensures it
  # runs (and can fail) even when a needed job failed, rather than being skipped.
  checks:
    name: checks
    runs-on: ubuntu-latest
    needs: [python, web]
    if: always()
    steps:
      - name: Require both suites to have succeeded
        run: |
          if [ "${{ needs.python.result }}" != "success" ] || [ "${{ needs.web.result }}" != "success" ]; then
            echo "python=${{ needs.python.result }} web=${{ needs.web.result }}"
            echo "One or more required suites did not pass."
            exit 1
          fi
          echo "All required suites passed."
